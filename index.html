<body>
  <div class="nav">
    <h1>Todo App</h1>
    <div class="men">
      <button id="Btn" onclick="OpenMenu()">☰</button>
    </div>
    <div class="menu"id="menu">
      <h2>Welcome ↓</h2>
      <h3 id="show-name"></h3>
      <hr>
      <div class="menu1">
      <a href="index.html"><i class="fa-solid fa-cubes"></i> Todo-App</a>
      <a href="about.html"><i class="fa-solid fa-user"></i> About</a>
      <button id="login-btn" onclick="login()"><i class="fa-solid fa-user-plus"></i> Login</button>
      <button id="logout-btn" onclick="logout()">Logout <i class="fa-solid fa-right-to-bracket"></i><span style="color:black;"></button>
      </div>
    </div>
  </div>
  <div class="search-control">
  <div class="search">
  <input class="search-input" type="search"placeholder="Search" id="search">
  <button onclick="Apply()"><i class="fa-solid fa-search"></i></button>
  </div>
  </div>
  <div class="select-control">
  <select class="select" id="select1">
    <option value="">none</option>
    <option value="coding">Coding</option>
    <option value="study">Study</option>
    <option value="bgmi">Bgmi</option>
    <option value="running">Running</option>
    <option value="eating">Eating </option>
    <option value="revision">Revision </option>
  </select>
  </div>
<hr>
<hr>
<div class="input-button">
<input class="input" type="text"placeholder="Enter Your Task" id="addTask">
  <select class="input-select" id="select">
    <option value="">none</option>
    <option value="coding">Coding</option>
    <option value="study">Study</option>
    <option value="bgmi">Bgmi</option>
    <option value="running">Running</option>
    <option value="eating">Eating </option>
    <option value="revision">Revision </option>
  </select>
<button onclick="addTask()">Add Task</button>
</div>
<hr>
<div class="card-center" id="showItems">
</div>
<hr>
<div class="total-all">
  <h2> Total: <span id="total"></span></h2>
  <button onclick="ClearAll()">All clear </button>
</div>
<div class="footer">
  <h3>Devloped by Rajab ali</h3>
</div>

<script>
let name=localStorage.getItem("username");
let user=localStorage.getItem("login");
//button--//
let loginBtn=document.getElementById("login-btn");
let logoutBtn=document.getElementById("logout-btn");
let show=document.getElementById("show-name");
if(user === "true"){
  loginBtn.style.display="none";
  logoutBtn.style.display="flex";
  show.innerHTML=name;
}
else{
   loginBtn.style.display = "flex";
 logoutBtn.style.display = "none";
 show.innerHTML="";
}
function login(){
  window.location.href="login.html";
}
function logout(){
  localStorage.removeItem("username");
  localStorage.removeItem("login");
  location.reload();
}
  //toggle-humburger-menu//
  window.addEventListener("DOMContentLoaded",function(){
    let menu=document.getElementById("menu");
    menu.style.display="none";  
    
  });
function OpenMenu(){
  let menu=document.getElementById("menu");
  let btn=document.getElementById("Btn");
  if(menu.style.display==="none"){
    menu.style.display="block";
    btn.innerHTML="✖️";
  }
  else{
    menu.style.display="none";
    btn.innerHTML="☰";
  }
}
  let eDit=null;
function addTask(){
  let task=JSON.parse(localStorage.getItem("task"))||[];
  let add=document.getElementById("addTask").value;
  let select=document.getElementById("select").value;
  //fin logic//
  let find=task.find(item => item.name === add && item.select === select);
  if(find){
    find.qty=(find.qty || 1)+1;
  }
  else if(eDit !== null){
    task[eDit].name=add;
    task[eDit].select=select;
    eDit=null;
  }
  else{
    task.push({
      name:add,
      select:select,
      qty:1,
      complete:false
      
    });
  }
  localStorage.setItem("task",JSON.stringify(task));
  ShowItems();
  
}
function ShowItems(filtered){
  let task=filtered||JSON.parse(localStorage.getItem("task"))||[];
let show=document.getElementById("showItems");
show.innerHTML="";
task.forEach((item,index)=>{
  show.innerHTML+=`
  <div class="card">
    <h2><span>Name : </span>${item.name}</h2>
    <h2><span> Task : </span>${item.select}</h2>
    <h4><span>Qty : </span>${item.qty}</h4>
    <h3><span style='color:black;'>Status: </span>${item.complete ? "<span style='text-decoration: line-through;'>Complete</span>":"<span style='color:red;'>Pending</span>"}</h3>
    <button onclick='Edit(${index})'><i class="fa-solid fa-pen-to-square"></i></button>
    <button onclick='Remove(${index})'><i class="fa-solid fa-trash"></i></button>
<div class="complete">
    <button onclick='Complete(${index})'${item.complete ? "Disabled":""}>🟢Complete</button>
    </div>
</div>
</div>
`;
});
if(task.length === 0){
  show.innerHTML="<h1 style='margin-left:10cm; color:white;'>Your list is empty❗ Add your first task to get started.📝</h1>";
}
Total();
}
//  Delete//
function Remove(index){
  let task=JSON.parse(localStorage.getItem("task"))||[];
  task.splice(index,1);
  localStorage.setItem("task",JSON.stringify(task));
  ShowItems();
}
//Search filter//
function Apply(){
  let task=JSON.parse(localStorage.getItem("task"))||[];
  let search=document.getElementById("search").value.toLowerCase();
   let select=document.getElementById("select1").value;
  let filtered=task.filter(item => item.name.toLowerCase().includes(search) && item.select === select);
  ShowItems(filtered);
}
//all Total//
  function Total(){
    let task=JSON.parse(localStorage.getItem("task"))||[];
    let total=0;
    task.forEach(item=>{
      total +=item.qty;
    });
    document.getElementById("total").innerHTML=total;
  }
  //edit button//
  function Edit(index){
    let task=JSON.parse(localStorage.getItem("task"))||[];
    document.getElementById("addTask").value=task[index].name;
    document.getElementById("select").value=task[index].select;
    eDit=index;
    ShowItems();
  }
//complete button//
function Complete(index){
  let task=JSON.parse(localStorage.getItem("task"))||[];
  task[index].complete=!task[index].complete;
  localStorage.setItem("task",JSON.stringify(task));
  ShowItems();
}
//All-clear button//
  function ClearAll(){
    localStorage.removeItem("task");
    ShowItems();
  }
ShowItems();
Total();
</script>
